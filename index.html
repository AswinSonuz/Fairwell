<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farewell Night</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }body{
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:#fff;
  overflow-x:hidden;
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:3rem;
  margin-bottom:10px;
  letter-spacing:2px;
}

.hero p{
  font-size:1.2rem;
  opacity:0.8;
  margin-bottom:30px;
}

.btn{
  padding:12px 25px;
  background:#ff7a18;
  border:none;
  border-radius:30px;
  color:#fff;
  font-size:1rem;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#ff4e50;
  transform:scale(1.05);
}

.section{
  padding:80px 20px;
  text-align:center;
}

.video-container{
  max-width:800px;
  margin:0 auto;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

iframe{
  width:100%;
  height:450px;
  border:none;
}

footer{
  padding:20px;
  text-align:center;
  opacity:0.6;
  font-size:0.9rem;
}

  </style>
</head>
<body>  <section class="hero">
    <h1>FAREWELL 2026</h1>
    <p>One Last Ride Together 💫</p>
    <button class="btn" onclick="scrollToVideo()">Watch Invitation</button>
  </section>  <section class="section" id="video">
    <h2 style="margin-bottom:20px;">Special Invitation</h2>
    <div class="video-container">
      <!-- Replace the link below with your video -->
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
    </div>
  </section>  <section class="section">
    <h2>Event Details</h2>
    <p>Date: Add Date</p>
    <p>Time: Add Time</p>
    <p>Venue: Add Location</p>
  </section>  <footer>
    Made with ❤️ by Your Batch
  </footer>  <script>
    function scrollToVideo(){
      document.getElementById('video').scrollIntoView({behavior:'smooth'});
    }
  </script></body>
</html>
