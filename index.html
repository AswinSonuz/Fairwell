<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farewell Night</title>  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

    body{
      background: radial-gradient(circle at 20% 30%, #1a1a2e, #0f0c29);
      color:#fff;
      overflow-x:hidden;
    }

    /* LOADER */
    #loader{
      position:fixed;
      width:100%;height:100%;
      background:#0f0c29;
      display:flex;align-items:center;justify-content:center;
      z-index:9999;
      transition:0.6s;
    }

    #loader h1{
      font-size:2rem;
      letter-spacing:3px;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse{
      0%{opacity:0.3}
      50%{opacity:1}
      100%{opacity:0.3}
    }

    /* HERO */
    .hero{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      backdrop-filter: blur(10px);
    }

    .glass{
      background:rgba(255,255,255,0.05);
      border-radius:20px;
      padding:40px;
      box-shadow:0 10px 40px rgba(0,0,0,0.6);
      border:1px solid rgba(255,255,255,0.1);
    }

    h1{
      font-size:3.5rem;
      font-weight:700;
      letter-spacing:3px;
      text-shadow:0 0 25px rgba(255,255,255,0.25);
    }

    p{
      margin-top:10px;
      opacity:0.8;
    }

    .btn{
      margin-top:25px;
      padding:12px 30px;
      border-radius:30px;
      border:none;
      background:linear-gradient(45deg,#ff7a18,#ff4e50);
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.08);
    }

    /* VIDEO */
    .section{
      padding:80px 20px;
      text-align:center;
    }

    .video-box{
      max-width:850px;
      margin:auto;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 15px 50px rgba(0,0,0,0.7);
    }

    iframe{
      width:100%;height:480px;border:none;
    }

    /* COUNTDOWN */
    .countdown{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:30px;
      flex-wrap:wrap;
    }

    .time-box{
      background:rgba(255,255,255,0.08);
      padding:20px;
      border-radius:15px;
      min-width:90px;
    }

    .time-box h2{
      font-size:2rem;
    }

    footer{
      padding:20px;
      text-align:center;
      opacity:0.5;
    }

  </style></head>
<body><div id="loader"><h1>LOADING...</h1></div><section class="hero">
  <div class="glass">
    <h1>FAREWELL 2026</h1>
    <p>One Last Ride Together ✨</p>
    <button class="btn" onclick="scrollToVideo()">Watch Invitation</button><div class="countdown">
  <div class="time-box"><h2 id="days">0</h2><p>Days</p></div>
  <div class="time-box"><h2 id="hours">0</h2><p>Hours</p></div>
  <div class="time-box"><h2 id="minutes">0</h2><p>Min</p></div>
  <div class="time-box"><h2 id="seconds">0</h2><p>Sec</p></div>
</div>

  </div>
</section><section class="section" id="video">
  <h2>Invitation Video</h2>
  <br>
  <div class="video-box">
    <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe>
  </div>
</section><section class="section">
  <h2>Event Details</h2>
  <p>Date: Add Date</p>
  <p>Time: Add Time</p>
  <p>Venue: Add Location</p>
</section><footer>
  Designed by Your Batch 🚀
</footer><script>

// LOADER
window.addEventListener("load",()=>{
  document.getElementById("loader").style.opacity="0";
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },600);
});

// SCROLL
function scrollToVideo(){
  document.getElementById('video').scrollIntoView({behavior:'smooth'});
}

// COUNTDOWN (SET YOUR DATE)
const eventDate = new Date("2026-04-01 18:00:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const gap = eventDate - now;

  const d = Math.floor(gap / (1000*60*60*24));
  const h = Math.floor((gap / (1000*60*60)) % 24);
  const m = Math.floor((gap / (1000*60)) % 60);
  const s = Math.floor((gap / 1000) % 60);

  document.getElementById("days").innerText = d;
  document.getElementById("hours").innerText = h;
  document.getElementById("minutes").innerText = m;
  document.getElementById("seconds").innerText = s;

},1000);

</script></body>
</html>
